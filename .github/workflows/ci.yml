name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  dotnet:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Format check
        run: dotnet format --verify-no-changes
      - name: Build
        run: dotnet build --no-restore -warnaserror
      - name: Test
        run: dotnet test --no-build
